# ============================================================
#  Alertmanager - alertmanager.yml
#  Notificaciones por email cuando Prometheus dispara alertas
# ============================================================

global:
  smtp_smarthost: '${SMTP_HOST}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASS}'
  smtp_require_tls: true
  resolve_timeout: 5m

# Plantillas de mensaje
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Árbol de enrutado de alertas
route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-admin'

  routes:
    # Alertas críticas: notificación inmediata
    - match:
        severity: critical
      receiver: 'email-admin'
      group_wait: 10s
      repeat_interval: 1h

    # Alertas de warning: agrupadas
    - match:
        severity: warning
      receiver: 'email-admin'
      repeat_interval: 4h

receivers:
  - name: 'email-admin'
    email_configs:
      - to: '${SMTP_TO}'
        send_resolved: true
        headers:
          Subject: '[SENTINEL] {{ .Status | toUpper }} - {{ .CommonAnnotations.summary }}'
        html: |
          <h2>🛡️ SENTINEL - Alerta de Monitorización</h2>
          <p><b>Estado:</b> {{ .Status | toUpper }}</p>
          {{ range .Alerts }}
          <hr>
          <p><b>Alerta:</b> {{ .Annotations.summary }}</p>
          <p><b>Descripción:</b> {{ .Annotations.description }}</p>
          <p><b>Instancia:</b> {{ .Labels.instance }}</p>
          <p><b>Severidad:</b> {{ .Labels.severity }}</p>
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']
