# ============================================================
#  Prometheus - Reglas de Alertas para SENTINEL
# ============================================================

groups:
  # ── Disponibilidad de instancias ──────────────────────────
  - name: availability
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instancia caída: {{ $labels.instance }}"
          description: "{{ $labels.job }} en {{ $labels.instance }} lleva más de 1 minuto sin responder."

  # ── Recursos del sistema ───────────────────────────────────
  - name: system_resources
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "CPU alta en {{ $labels.instance }}"
          description: "CPU al {{ humanize $value }}% durante más de 2 minutos."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RAM alta en {{ $labels.instance }}"
          description: "Memoria al {{ humanize $value }}% de uso."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Poco espacio en disco: {{ $labels.instance }}"
          description: "Queda menos del 15% de espacio libre en {{ $labels.mountpoint }}."

  # ── Base de datos ─────────────────────────────────────────
  - name: database
    rules:
      - alert: MariaDBDown
        expr: mysql_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "¡MariaDB caída en {{ $labels.instance }}!"
          description: "El servicio MariaDB no responde. Acción inmediata requerida."

      - alert: MariaDBHighConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Muchas conexiones MariaDB en {{ $labels.instance }}"
          description: "Uso de conexiones al {{ humanize $value }}%."

  # ── Apache ────────────────────────────────────────────────
  - name: web
    rules:
      - alert: ApacheDown
        expr: apache_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "¡Apache caído en {{ $labels.instance }}!"
          description: "El servidor web no responde."
